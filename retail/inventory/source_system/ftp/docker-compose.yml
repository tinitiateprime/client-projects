services:
  source-ftp:
    image: fauria/vsftpd
    container_name: retail-source-ftp
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    environment:
      FTP_USER: source_user
      FTP_PASS: source_pass
      PASV_ADDRESS: 127.0.0.1
      PASV_MIN_PORT: 21100
      PASV_MAX_PORT: 21110
    volumes:
      - ../generated:/home/vsftpd/source_user
